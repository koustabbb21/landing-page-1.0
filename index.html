<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=play_circle,stack" />
    <link rel="stylesheet" href="/style.css">
    <title>StreamLine</title>
</head>
<body>
    <div class="container">
        <div class="nav-container">
            <div class="left-nav-part">
                <span class="name-icon-container">
                    <span id="name-icon" class="material-symbols-outlined">stack</span>
                </span>
                <span id="name">StreamLine</span>
            </div>
            <div class="center-nav-part">
                <span id="home" class="center-nav-part-items">Home</span>
                <span id="features" class="center-nav-part-items">Features</span>
                <span id="pricing" class="center-nav-part-items">Pricing</span>
            </div>
            <div class="right-nav-part">
                <div class="get-started-button">Get Started</div>
            </div>
        </div>
        <div class="hero-container">
            <div id="left-hero-container" class="hero-container-items">
                <div id="hero-heading">Simplify Your <span style="color: #0051ffc9;">Workflow</span></div>

                <div id="hero-subheading">The all-in-one platform to manage your tasks and teams effortlessly. Built for speed, scale, and clarity.</div>

                <div id="hero-buttons-container">
                    <div id="free-trial-button"  class="hero-buttons">Start Free Trial</div>
                    <div id="demo-button"  class="hero-buttons">
                        <span class="material-symbols-outlined" style="position: relative; right: 5px; font-size: 26px;">play_circle</span>
                        <span style="position: relative; top: 2px;">Watch Demo</span>
                    </div>
                </div>
            </div>
            <div id="right-hero-container" class="hero-container-items"></div>
        </div>
    </div>
</body>
</html>
